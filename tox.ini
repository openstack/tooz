[tox]
minversion = 3.18.0
envlist = py3,py{310,313}-{zookeeper,redis,sentinel,memcached,postgresql,mysql,consul,etcd,etcd3gw,kubernetes},pep8

[testenv]
deps =
    -c{env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/test-requirements.txt
setenv =
    TOOZ_TEST_URLS = file:///tmp ipc://
    zookeeper: TOOZ_TEST_DRIVERS = zookeeper
    redis: TOOZ_TEST_DRIVERS = redis
    sentinel: TOOZ_TEST_DRIVERS = redis --sentinel
    sentinel: TOOZ_TEST_SENTINEL = 1
    memcached: TOOZ_TEST_DRIVERS = memcached
    mysql: TOOZ_TEST_DRIVERS = mysql
    postgresql: TOOZ_TEST_DRIVERS = postgresql
    etcd: TOOZ_TEST_DRIVERS = etcd,etcd --cluster
    etcd3gw: TOOZ_TEST_DRIVERS = etcd
    etcd3gw: TOOZ_TEST_ETCD3GW = 1
    consul: TOOZ_TEST_DRIVERS = consul
    kubernetes: TOOZ_TEST_DRIVERS = kubernetes
allowlist_externals =
    {toxinidir}/run-tests.sh
commands =
    {toxinidir}/run-tests.sh stestr run "{posargs}"
passenv =
    ETCD_VERSION

[testenv:venv]
# This target is used by the gate go run Sphinx to build the doc
deps = {[testenv:docs]deps}
commands = {posargs}

[testenv:examples]
allowlist_externals =
    {toxinidir}/run-examples.sh
commands =
    {toxinidir}/run-examples.sh

[testenv:cover]
deps = {[testenv]deps}
setenv = {[testenv]setenv}
    PYTHON=coverage run --source tooz --parallel-mode
commands =
    coverage erase
    {toxinidir}/run-tests.sh stestr run "{posargs}"
    coverage combine
    coverage html -d cover
    coverage xml -o cover/coverage.xml
    coverage report --show-missing

[testenv:docs]
deps =
    -c{env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
    -r{toxinidir}/doc/requirements.txt
commands =
    sphinx-build -W -b html doc/source doc/build/html

[testenv:releasenotes]
deps = {[testenv:docs]deps}
commands =
    sphinx-build -a -E -W -d releasenotes/build/doctrees -b html releasenotes/source releasenotes/build/html

[testenv:pep8]
description =
  Run style checks.
deps =
  pre-commit
  {[testenv:mypy]deps}
commands =
  pre-commit run -a
  {[testenv:mypy]commands}

[testenv:mypy]
description =
  Run type checks.
deps =
  {[testenv]deps}
  mypy
  msgpack-types
  types-PyMySQL
  types-psycopg2
  types-requests
commands =
  mypy --cache-dir="{envdir}/mypy_cache" {posargs:tooz}

[flake8]
# We only enable the hacking (H) checks
select = H
show-source = true
exclude = .venv,.git,.tox,dist,*egg,*.egg-info,build,examples,doc

[hacking]
import_exceptions =
  collections.abc
  typing
  typing_extensions
